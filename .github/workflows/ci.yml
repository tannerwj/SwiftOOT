name: CI

on:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Generate, Build, and Test
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install pinned Tuist
        uses: jdx/mise-action@v4

      - name: Show tool versions
        run: |
          tuist version
          xcodebuild -version

      - name: Resolve external packages
        run: tuist install

      - name: Generate workspace
        run: tuist generate --no-open

      - name: Build OOTMac
        run: xcodebuild -workspace SwiftOOT.xcworkspace -scheme OOTMac -destination 'platform=macOS' build

      - name: Run M0 tests
        run: xcodebuild -workspace SwiftOOT.xcworkspace -scheme SwiftOOT-Workspace -destination 'platform=macOS' test
